version: v1.0
name: Create testing env
agent:
  machine:
    type: e2-standard-2
    os_image: ubuntu2004
blocks:
  - name: "Generate certificates"
    dependencies: []
    task:
      jobs:
        - name: "Generate cert"
          commands:
            - echo 1
  - name: "Spin up test environment"
    dependencies: ["Generate certificates"]
    task:
      jobs:
        - name: Terraform apply
          commands:
            - echo 1
  - name: "Install Semaphore app"
    dependencies: ["Spin up test environment"]
    task:
      jobs:
        - name: Helm install
          commands:
            - echo 1
  - name: "Setup DNS"
    dependencies: ["Spin up test environment"]
    task:
      jobs:
        - name: Terraform apply
          commands:
            - echo 1

promotions:
  - name: E2E
    pipeline_file: env-e2e.yml
    deployment_target: provision-test-env
    parameters:
      env_vars:
        - name: CLOUD_TEST_ENV_PREFIX
          required: true
          options:
            - ahasanbasic
            - dbecirovic
            - dkolundzija
            - lpinheiro
            - master
            - mkutryj
            - pforesti
            - radwo
            - vmaksimovic
        - name: CLOUD_TEST_ENVIRONMENT_TYPE
          required: true
          options:
            - gke
            - single-vm
