image: audit
imageTag: latest
imagePullSecrets: []

logging: info

api:
  replicas: 1
  dbPoolSize: 2
  retention:
    consumerEnabled: true
    minRetentionDays: 400
    gracePeriodDays: 15
    applierBatchSize: 1000
    # Staged rollout: let the marker run and observe retention.marked /
    # retention.backlog for at least one grace period, then enable deletion.
    deleterEnabled: false
    deleterSleepPeriodSec: 30
    deleterDrainPeriodSec: 1
    deleterBatchSize: 100
  resources:
    limits:
      cpu: "0.2"
      memory: 300Mi
    requests:
      cpu: "0.2"
      memory: 150Mi

sidecarEncryptor:
  resources:
    limits:
      cpu: 20m
      memory: 50Mi
    requests:
      cpu: 5m
      memory: 25Mi

statsd:
  resources:
    limits:
      cpu: "20m"
      memory: "50Mi"
    requests:
      cpu: "5m"
      memory: "25Mi"
