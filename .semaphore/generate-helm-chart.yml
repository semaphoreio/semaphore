version: v1.0
name: Generate Helm Chart
agent:
  machine:
    type: e2-standard-2
    os_image: ubuntu2004
blocks:
  - name: "Create Helm chart"
    task:
      jobs:
        - name: Create helm chart artifact
          commands:
            - echo 1

promotions:
  - name: Spin up test environments
    pipeline_file: env-create.yml
    deployment_target: provision-test-env
    parameters:
      env_vars:
        - name: CLOUD_TEST_ENV_PREFIX
          required: true
          options:
            - ahasanbasic
            - dbecirovic
            - dkolundzija
            - lpinheiro
            - master
            - mkutryj
            - pforesti
            - radwo
            - vmaksimovic
        - name: CLOUD_TEST_ENVIRONMENT_TYPE
          required: true
          options:
            - gke
            - single-vm
